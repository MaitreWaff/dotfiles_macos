- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
    ~/.zshenv:
    ~/.bashrc:
    ~/.gitconfig:
    ~/.gitignore_global: gitignore_global
#    ~/.vim: vim
    ~/.vimrc: vimrc
    ~/.tmux.conf: tmux.conf
    ~/.config/bat:
      create: true
      path: config/bat

- create:
    - ~/workspace
#    - ~/downloads
#    - ~/.vim/undo-history
