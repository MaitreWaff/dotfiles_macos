- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
    ~/.zshenv:
    ~/.bashrc:
    ~/.gitconfig:
#    ~/.vim: vim
    ~/.vimrc: vimrc
    ~/.tmux.conf: tmux.conf
    ~/.config/bat:
      create: true
      path: config/bat

- create:
    - ~/workspace
#    - ~/downloads
#    - ~/.vim/undo-history

- shell:
#  - [git submodule update --init --recursive, Installing submodules]
  - command: ./setup_homebrew.zsh
    stdout: true
    stderr: true
  - command: ./setup_zsh.zsh
    stdout: true
    stderr: true

