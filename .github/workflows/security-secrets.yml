name: Security — Scan secrets (Gitleaks)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Scan hebdomadaire — lundi à 6h UTC
    # Permet de détecter les nouvelles règles gitleaks sur l'historique existant
    - cron: "0 6 * * 1"

# Permissions minimales — lecture seule
permissions:
  contents: read

jobs:
  gitleaks:
    name: Détection de secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout — historique complet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — node24
        with:
          # fetch-depth: 0 est obligatoire pour scanner TOUT l'historique git
          # Sans ça, seul le dernier commit est analysé
          fetch-depth: 0

      - name: Installer Gitleaks v8.30.1
        run: |
          GITLEAKS_VERSION="8.30.1"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          EXPECTED_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

          echo "→ Téléchargement de gitleaks v${GITLEAKS_VERSION}..."
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}" \
            -o "${ARCHIVE}"

          echo "→ Vérification du checksum SHA256..."
          echo "${EXPECTED_SHA256}  ${ARCHIVE}" | sha256sum --check --strict

          echo "→ Extraction..."
          tar -xzf "${ARCHIVE}" gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan — historique complet toutes branches
        run: |
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --log-opts="--all" \
            --exit-code 1

      - name: Upload rapport (si secrets détectés)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 — node24
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7
